<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soft Hours — Ambient Mixer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0e0e14;
    --surface:   #15141e;
    --surface2:  #1d1c2a;
    --rim:       #2c2a3e;
    --mist:      #8e8aaa;
    --soft:      #cdc8e0;
    --cream:     #ede8f8;
    --gold:      #c8a84a;
    --green:     #6a8c4a;
    --green2:    #4a6c30;
    --terracotta:#b06840;

    --rain-col:    #6a9fbf;
    --thunder-col: #9b87c4;
    --fire-col:    #c98050;
    --noise-col:   #7ab09a;
    --train-col:   #a0956e;
    --breeze-col:  #7aabb5;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--soft);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
  }

  /* ── Light mode overrides ── */
  body.light-mode {
    --bg:      #f2e8d6;
    --surface: #e8dcc8;
    --surface2:#ddd0b8;
    --rim:     #c4b090;
    --mist:    #7a6040;
    --soft:    #3c2810;
    --cream:   #281808;
  }
  body.light-mode, html:has(body.light-mode) {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 70% 35% at 50% 0%, rgba(160,120,40,0.10) 0%, transparent 70%),
      radial-gradient(ellipse 40% 25% at 20% 100%, rgba(100,140,60,0.07) 0%, transparent 60%);
    color: var(--soft);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 20px 60px;
    background-image:
      radial-gradient(ellipse 70% 35% at 50% 0%, rgba(200,168,74,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 40% 25% at 20% 100%, rgba(106,140,74,0.06) 0%, transparent 60%);
  }

  header {
    text-align: center;
    margin-bottom: 32px;
    position: relative;
  }

  .theme-btn {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 100;
    background: var(--surface);
    border: 1px solid var(--rim);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    cursor: pointer;
    font-size: 0.95rem;
    line-height: 1;
    color: var(--mist);
    transition: border-color 0.3s, color 0.3s, background 0.25s;
  }
  .theme-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--surface2); }

  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2rem, 5vw, 2.8rem);
    letter-spacing: 0.12em;
    color: var(--cream);
    display: block;
  }
  .wordmark em { font-style: italic; color: var(--gold); }

  .tagline {
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--mist);
    margin-top: 5px;
    display: block;
  }

  /* ── Night-mode scene frame ── */
  body:not(.light-mode) .scene {
    box-shadow:
      0 0 0 2px #2c2a3e,
      0 0 0 5px #1a1828,
      0 8px 40px rgba(155,135,196,0.18),
      0 0 18px rgba(155,135,196,0.08) inset;
    border-radius: 16px;
  }

  /* ── Light-mode scene frame ── */
  body.light-mode .scene {
    box-shadow:
      0 0 0 3px #c4a060,
      0 0 0 6px #e8d4a0,
      0 8px 32px rgba(100,65,10,0.18);
    border-radius: 16px;
  }

  /* ── Scene ── */
  .scene {
    width: 100%;
    max-width: 560px;
    height: 200px;
    margin-bottom: 36px;
    position: relative;
    border-radius: 14px;
    overflow: hidden;
  }
  .scene canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── Cards ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    width: 100%;
    max-width: 700px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--rim);
    border-radius: 14px;
    padding: 18px 20px 20px;
    transition: border-color 0.3s, background 0.3s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 14px;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  .card.active { border-color: var(--accent, var(--gold)); background: var(--surface2); }
  .card.active::before { opacity: 1; }

  .card[data-sound="rain"]     { --accent: var(--rain-col); }
  .card[data-sound="thunder"]  { --accent: var(--thunder-col); }
  .card[data-sound="fire"]     { --accent: var(--fire-col); }
  .card[data-sound="brown"]    { --accent: var(--noise-col); }
  .card[data-sound="train"]    { --accent: var(--train-col); }
  .card[data-sound="breeze"]   { --accent: var(--breeze-col); }

  .card[data-sound="rain"]::before     { background: radial-gradient(circle at 50% 0%, rgba(106,159,191,0.12) 0%, transparent 70%); }
  .card[data-sound="thunder"]::before  { background: radial-gradient(circle at 50% 0%, rgba(155,135,196,0.12) 0%, transparent 70%); }
  .card[data-sound="fire"]::before     { background: radial-gradient(circle at 50% 0%, rgba(201,128,80,0.12) 0%, transparent 70%); }
  .card[data-sound="brown"]::before    { background: radial-gradient(circle at 50% 0%, rgba(122,176,154,0.12) 0%, transparent 70%); }
  .card[data-sound="train"]::before    { background: radial-gradient(circle at 50% 0%, rgba(160,149,110,0.12) 0%, transparent 70%); }
  .card[data-sound="breeze"]::before   { background: radial-gradient(circle at 50% 0%, rgba(122,171,181,0.12) 0%, transparent 70%); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 11px;
    margin-bottom: 16px;
  }

  .toggle-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1.5px solid var(--rim);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: all 0.25s;
    flex-shrink: 0;
    color: var(--mist);
  }
  .card.active .toggle-btn {
    border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    color: var(--accent);
    box-shadow: 0 0 10px color-mix(in srgb, var(--accent) 25%, transparent);
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 1.05rem;
    letter-spacing: 0.04em;
    color: var(--cream);
  }

  .loading-badge {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mist);
    background: color-mix(in srgb, var(--mist) 15%, transparent);
    border-radius: 4px;
    padding: 2px 6px;
    display: none;
  }
  .card.loading .loading-badge { display: inline-block; }

  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .vol-label {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mist);
    width: 24px;
    text-align: right;
    flex-shrink: 0;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: var(--rim);
    outline: none;
    cursor: pointer;
    transition: background 0.3s;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--mist);
    border: none;
    transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
  }
  .card.active input[type=range] { background: color-mix(in srgb, var(--accent) 30%, var(--rim)); }
  .card.active input[type=range]::-webkit-slider-thumb {
    background: var(--accent);
    box-shadow: 0 0 7px color-mix(in srgb, var(--accent) 60%, transparent);
    transform: scale(1.1);
  }

  .master {
    width: 100%;
    max-width: 700px;
    margin-top: 24px;
    background: var(--surface);
    border: 1px solid var(--rim);
    border-radius: 14px;
    padding: 16px 22px;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .master-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    color: var(--mist);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .master input[type=range] { flex: 1; }

  .status {
    margin-top: 18px;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mist);
    text-align: center;
    min-height: 1.2em;
  }
  .status.playing { color: var(--gold); }

  .credits {
    margin-top: 32px;
    max-width: 500px;
    font-size: 0.65rem;
    line-height: 1.8;
    color: var(--mist);
    text-align: center;
    opacity: 0.6;
  }
  .credits a { color: var(--mist); }

  .pause-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    background: color-mix(in srgb, var(--gold) 10%, transparent);
    color: var(--gold);
    cursor: pointer;
    font-size: 0.9rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2px 0 0 3px;
    flex-shrink: 0;
    transition: all 0.2s;
    opacity: 0.45;
    pointer-events: none;
  }
  .pause-btn.sounds-active {
    opacity: 1;
    pointer-events: auto;
    padding: 0;
  }
  .pause-btn.sounds-active:hover { background: color-mix(in srgb, var(--gold) 22%, transparent); }
  .pause-btn.paused {
    padding: 2px 0 0 3px;
    border-color: var(--green);
    color: var(--green);
    background: color-mix(in srgb, var(--green) 12%, transparent);
    box-shadow: 0 0 10px color-mix(in srgb, var(--green) 25%, transparent);
  }

  .lofi-card { cursor: pointer; }
  .lofi-card:hover { border-color: var(--gold) !important; }
  .lofi-btn {
    border-color: var(--gold) !important;
    background: color-mix(in srgb, var(--gold) 12%, transparent) !important;
    color: var(--gold) !important;
  }
  .lofi-desc {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--mist);
    margin-top: 4px;
    text-align: right;
  }
</style>
<script>
var shLight = (new Date().getHours() >= 7 && new Date().getHours() < 19);
try { var _sl = localStorage.getItem('softHoursLight'); if (_sl !== null) shLight = _sl === 'true'; } catch(e){}

function shApply() {
  try {
    var btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = shLight ? '🌙' : '☀️';
    window._manualTheme = true;
    var de = document.documentElement.style;
    if (shLight) {
      de.setProperty('--bg','#f2e8d6'); de.setProperty('--surface','#e8dcc8');
      de.setProperty('--surface2','#ddd0b8'); de.setProperty('--rim','#c4b090');
      de.setProperty('--mist','#7a6040'); de.setProperty('--soft','#3c2810');
      de.setProperty('--cream','#281808');
      document.documentElement.style.setProperty('background','#f2e8d6');
    } else {
      ['--bg','--surface','--surface2','--rim','--mist','--soft','--cream']
        .forEach(function(v){ de.removeProperty(v); });
      document.documentElement.style.removeProperty('background');
    }
    if (document.body) {
      document.body.style.cssText = shLight
        ? 'background:#f2e8d6 !important; color:#3c2810 !important;'
        : '';
      document.body.classList.toggle('light-mode', shLight);
    }
  } catch(e) { alert('theme error: ' + e); }
}

function shToggle() {
  shLight = !shLight;
  try { localStorage.setItem('softHoursLight', shLight); } catch(e){}
  shApply();
}

document.addEventListener('DOMContentLoaded', shApply);
</script>
</head>
<body>

<header>
  <span class="wordmark">Soft <em>Hours</em></span>
  <span class="tagline">ambient sound mixer</span>
  <button class="theme-btn" id="theme-btn" aria-label="Toggle light/dark mode" title="Toggle light/dark" onclick="shToggle()">☀️</button>
</header>

<div class="scene">
  <canvas id="scene-canvas"></canvas>
</div>

<div class="grid" id="sound-grid">

  <div class="card" data-sound="rain">
    <div class="card-header">
      <button class="toggle-btn" aria-label="Toggle rain">🌧</button>
      <span class="card-title">Rain</span>
      <span class="loading-badge">loading…</span>
    </div>
    <div class="slider-wrap">
      <span class="vol-label">vol</span>
      <input type="range" min="0" max="100" value="80" aria-label="Rain volume">
    </div>
  </div>

  <div class="card" data-sound="thunder">
    <div class="card-header">
      <button class="toggle-btn" aria-label="Toggle thunder and rain">⛈</button>
      <span class="card-title">Thunderstorm</span>
      <span class="loading-badge">loading…</span>
    </div>
    <div class="slider-wrap">
      <span class="vol-label">vol</span>
      <input type="range" min="0" max="100" value="95" aria-label="Storm volume">
    </div>
  </div>

  <div class="card" data-sound="fire">
    <div class="card-header">
      <button class="toggle-btn" aria-label="Toggle fire">🔥</button>
      <span class="card-title">Crackling Fire</span>
      <span class="loading-badge">loading…</span>
    </div>
    <div class="slider-wrap">
      <span class="vol-label">vol</span>
      <input type="range" min="0" max="100" value="100" aria-label="Fire volume">
    </div>
  </div>

  <div class="card" data-sound="brown">
    <div class="card-header">
      <button class="toggle-btn" aria-label="Toggle brown noise">〰</button>
      <span class="card-title">Brown Noise</span>
      <span class="loading-badge">loading…</span>
    </div>
    <div class="slider-wrap">
      <span class="vol-label">vol</span>
      <input type="range" min="0" max="100" value="8" aria-label="Brown noise volume">
    </div>
  </div>

  <div class="card" data-sound="train">
    <div class="card-header">
      <button class="toggle-btn" aria-label="Toggle railroad">🚂</button>
      <span class="card-title">Railroad</span>
      <span class="loading-badge">loading…</span>
    </div>
    <div class="slider-wrap">
      <span class="vol-label">vol</span>
      <input type="range" min="0" max="100" value="40" aria-label="Railroad volume">
    </div>
  </div>

  <div class="card lofi-card" id="lofi-card">
    <div class="card-header">
      <button class="toggle-btn lofi-btn" id="lofi-btn" aria-label="Open Lofi Girl">🎵</button>
      <span class="card-title">Lofi Girl</span>
    </div>
    <div class="lofi-desc">opens live stream ↗</div>
  </div>

</div>

<div class="master">
  <button id="pause-all-btn" class="pause-btn" title="Start some sounds first" aria-label="Pause all sounds">▶</button>
  <span class="master-label">Master vol</span>
  <input type="range" id="master-vol" min="0" max="100" value="80" aria-label="Master volume">
</div>

<p class="status" id="status">No sounds playing</p>

<p class="credits">
  Brown noise synthesized · Rain, fire, railroad &amp; thunder from local audio files
</p>

<script>
// ── Audio ────────────────────────────────────────────────────────────────────
// Rain, fire, breeze: load from local files if present (put mp3s next to html).
//   Expected filenames: rain.mp3, fire.mp3, breeze.mp3
//   Falls back to synthesis if files aren't found.
// Brown noise, thunder, railroad: always synthesized.

let ctx = null;
let _masterGain = null;
let masterVol = 0.8;
const engines = {};

const LOCAL_FILES = {
  rain:    '595717__lynks__soft-rain-loop.mp3',
  fire:    '729396__heckfricker__campfire-02.mp3',
  train:   '737954__qubodup__train-driving-by-loop.mp3',
  thunder: '21043__acclivity__stormloop22jul06.mp3',
};
const LOCAL_FILE_GAIN = { fire: 3.0 };
const audioEls = {};
// Sounds that must loop gaplessly — loaded via Web Audio API (fetch+decode)
// instead of HTML audio element, which adds an MP3 encoder-delay gap on loop.
const GAPLESS_SOUNDS = new Set(['rain', 'fire', 'train', 'thunder']);
const gaplessBuffers = {};

Object.entries(LOCAL_FILES).forEach(([key, filename]) => {
  if (GAPLESS_SOUNDS.has(key)) return; // handled separately
  const el = document.createElement('audio');
  el.src = filename;
  el.loop = true; el.preload = 'auto';
  el.style.cssText = 'display:none;position:absolute;left:-9999px';
  el.addEventListener('error', () => console.warn('[SoftHours] failed to load:', key, filename), { once: true });
  document.body.appendChild(el);
  audioEls[key] = el;
});

// Pre-fetch gapless sounds so they're ready when the user clicks
Object.entries(LOCAL_FILES).forEach(([key, filename]) => {
  if (!GAPLESS_SOUNDS.has(key)) return;
  fetch(filename)
    .then(r => r.arrayBuffer())
    .then(ab => {
      const tmpCtx = new (window.AudioContext || window.webkitAudioContext)();
      return tmpCtx.decodeAudioData(ab).then(buf => { gaplessBuffers[key] = buf; tmpCtx.close(); });
    })
    .catch(() => console.warn('[SoftHours] gapless prefetch failed for', key, filename));
});

function makeGaplessAudio(sound, vol) {
  ensureCtx();
  const gainMul = LOCAL_FILE_GAIN[sound] || 1;
  const gain = ctx.createGain();
  gain.gain.value = vol * masterVol * gainMul;
  gain.connect(getMaster());
  let src = null;
  let _vol = vol;

  function startFromBuffer(buf) {
    src = ctx.createBufferSource();
    src.buffer = buf;
    src.loop = true;
    src.connect(gain);
    src.start(0);
  }

  if (gaplessBuffers[sound]) {
    startFromBuffer(gaplessBuffers[sound]);
  } else {
    // Buffer not ready yet — fetch now (user just clicked)
    fetch(LOCAL_FILES[sound])
      .then(r => r.arrayBuffer())
      .then(ab => ctx.decodeAudioData(ab))
      .then(buf => { gaplessBuffers[sound] = buf; if (engines[sound]) startFromBuffer(buf); })
      .catch(() => { if (synthMap[sound] && engines[sound]) engines[sound] = synthMap[sound](_vol); });
  }

  return {
    gain,
    stop() { try { src && src.stop(); } catch(e){} gain.disconnect(); }
  };
}

function makeLocalAudio(sound, vol) {
  if (GAPLESS_SOUNDS.has(sound)) return makeGaplessAudio(sound, vol);
  const el = audioEls[sound];
  const gainMul = LOCAL_FILE_GAIN[sound] || 1;
  el.volume = Math.min(1, vol * masterVol * gainMul);
  let _vol = vol;
  let usingSynth = false;

  function fallbackToSynth() {
    if (usingSynth || !synthMap[sound]) return;
    usingSynth = true;
    console.warn('[SoftHours] falling back to synth for', sound);
    if (engines[sound] && engines[sound].isAudioEl) {
      engines[sound] = synthMap[sound](_vol);
    }
  }

  function startPlay() {
    el.play().catch(err => {
      console.warn('[SoftHours] play failed for', sound, '-', err.name);
      fallbackToSynth();
    });
  }

  if (el.error) {
    fallbackToSynth();
  } else if (el.readyState >= 3) {
    startPlay();
  } else {
    el.addEventListener('canplay', startPlay, { once: true });
    el.addEventListener('error', () => fallbackToSynth(), { once: true });
  }

  return {
    gain: { gain: { setTargetAtTime(v) { _vol = v; if (!usingSynth) el.volume = Math.min(1, v * masterVol * gainMul); } } },
    isAudioEl: true, el, volRef: () => _vol,
    stop() { el.pause(); el.currentTime = 0; }
  };
}

function updateAudioElVolumes() {
  Object.values(engines).forEach(eng => {
    if (eng.isAudioEl) eng.el.volume = Math.min(1, eng.volRef() * masterVol);
  });
}

function getMaster() {
  if (!_masterGain && ctx) {
    _masterGain = ctx.createGain();
    _masterGain.connect(ctx.destination);
    _masterGain.gain.value = masterVol;
  }
  return _masterGain;
}

function ensureCtx() {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    _masterGain = ctx.createGain();
    _masterGain.connect(ctx.destination);
    _masterGain.gain.value = masterVol;
  }
  if (ctx.state === 'suspended') ctx.resume();
}

// ── Real audio elements (rain, fire, breeze) ─────────────────────────────────
// ── Rain (synth) ─────────────────────────────────────────────────────────────
// Pink noise softened through gentle low-pass (not bandpass) = no harshness.
function makeRain(vol) {
  const gain = ctx.createGain();
  gain.gain.value = vol * 0.85;
  gain.connect(getMaster());
  const sr = ctx.sampleRate;
  const srcs = [];

  // Pink noise via Paul Kellet
  function pinkBuf(secs) {
    const buf = ctx.createBuffer(1, sr * secs, sr);
    const d = buf.getChannelData(0);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < d.length; i++) {
      const w = Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;
      b6=w*0.115926;
    }
    return buf;
  }

  // Three layers — each through gentle lowpass, NOT bandpass.
  // Lowpass keeps it soft; different cutoffs give frequency depth.
  // High layer gives presence, mid gives body, low gives rumble.
  const buf = pinkBuf(10);
  [[2200, 0.55], [900, 0.7], [300, 0.25]].forEach(([cutoff, g], i) => {
    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    src.loopStart = i * 3.1; src.loopEnd = buf.duration - 0.5;
    // Two gentle lowpass stages — removes the harsh "static" edge
    const lp1 = ctx.createBiquadFilter(); lp1.type='lowpass'; lp1.frequency.value=cutoff; lp1.Q.value=0.3;
    const lp2 = ctx.createBiquadFilter(); lp2.type='lowpass'; lp2.frequency.value=cutoff*0.7; lp2.Q.value=0.3;
    const gn = ctx.createGain(); gn.gain.value = g;
    src.connect(lp1); lp1.connect(lp2); lp2.connect(gn); gn.connect(gain);
    src.start(0, i * 3.3); srcs.push(src);
  });

  return { gain, stop() { srcs.forEach(s => { try{s.stop();}catch(e){} }); } };
}

// ── Fire (synth) ─────────────────────────────────────────────────────────────
// Brown noise through very low bandpass = warm roar. No high frequencies.
function makeFire(vol) {
  const gain = ctx.createGain();
  gain.gain.value = vol * 1.1;
  gain.connect(getMaster());
  let active = true;
  const srcs = [];

  // Three brown layers at different very-low center frequencies
  // Brown noise through gentle lowpass = warm fire body without static
  [[0.006, 180, 1.1, 13], [0.003, 90, 0.6, 17], [0.010, 280, 0.38, 10]].forEach(([k, cutoff, g, len], i) => {
    const buf = makeBrownBuf(len, k);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    src.loopStart = 0.5; src.loopEnd = len - 0.5;
    src.playbackRate.value = 0.75 + i * 0.08;
    // Gentle lowpass — no resonant peaks
    const lp1 = ctx.createBiquadFilter(); lp1.type='lowpass'; lp1.frequency.value=cutoff; lp1.Q.value=0.3;
    const lp2 = ctx.createBiquadFilter(); lp2.type='lowpass'; lp2.frequency.value=cutoff*0.6; lp2.Q.value=0.3;
    const gn = ctx.createGain(); gn.gain.value = g;
    src.connect(lp1); lp1.connect(lp2); lp2.connect(gn); gn.connect(gain);
    src.start(0, i * 4.1); srcs.push(src);
  });

  // Very slow breathing — fire settles and rises, not wave-like
  const lfo = ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.07;
  const lfoG = ctx.createGain(); lfoG.gain.value=0.12;
  lfo.connect(lfoG); lfoG.connect(gain.gain); lfo.start(); srcs.push(lfo);

  // Second micro-flicker LFO for realism
  const lfo2 = ctx.createOscillator(); lfo2.type='sine'; lfo2.frequency.value=0.23;
  const lfoG2 = ctx.createGain(); lfoG2.gain.value=0.05;
  lfo2.connect(lfoG2); lfoG2.connect(gain.gain); lfo2.start(); srcs.push(lfo2);

  // Occasional low wood pops — sine thud, short, sparse
  function pop() {
    if (!active) return;
    setTimeout(() => {
      if (!active) return;
      const osc = ctx.createOscillator(); osc.type='sine'; osc.frequency.value=48+Math.random()*22;
      const env = ctx.createGain(); const now=ctx.currentTime;
      env.gain.setValueAtTime(0, now);
      env.gain.linearRampToValueAtTime(0.5+Math.random()*0.25, now+0.01);
      env.gain.exponentialRampToValueAtTime(0.0001, now+0.22);
      osc.connect(env); env.connect(gain); osc.start(now); osc.stop(now+0.25);
      pop();
    }, 1400 + Math.random() * 4000);
  }
  pop();

  return { gain, stop() { active=false; srcs.forEach(s=>{ try{s.stop();}catch(e){} }); } };
}

// ── Breeze (synth) ────────────────────────────────────────────────────────────
function makeBreeze(vol) {
  const gain = ctx.createGain();
  gain.gain.value = vol * 0.55;
  gain.connect(getMaster());
  const srcs = [];

  [[0.009, 140, 0.8, 18, 0.48], [0.004, 80, 0.6, 24, 0.38]].forEach(([k, lp, g, len, pb], i) => {
    const buf = makeBrownBuf(len, k);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    src.loopStart = 1; src.loopEnd = len - 1;
    src.playbackRate.value = pb;
    const f1 = ctx.createBiquadFilter(); f1.type='lowpass'; f1.frequency.value=lp;
    const f2 = ctx.createBiquadFilter(); f2.type='lowpass'; f2.frequency.value=lp*0.5;
    const gn = ctx.createGain(); gn.gain.value = g;
    src.connect(f1); f1.connect(f2); f2.connect(gn); gn.connect(gain);
    src.start(0, i*6); srcs.push(src);
  });

  const lfo = ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.04;
  const lfoG = ctx.createGain(); lfoG.gain.value=0.2;
  lfo.connect(lfoG); lfoG.connect(gain.gain); lfo.start(); srcs.push(lfo);

  return { gain, stop() { srcs.forEach(s=>{ try{s.stop();}catch(e){} }); } };
}


// ── Synth helpers ─────────────────────────────────────────────────────────────
function makeBrownBuf(seconds, k) {
  const sr = ctx.sampleRate;
  const buf = ctx.createBuffer(1, sr * seconds, sr);
  const d = buf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < d.length; i++) {
    const w = Math.random() * 2 - 1;
    d[i] = (last + k * w) / (1 + k);
    last = d[i];
    d[i] *= (3 / k) * 0.006;
  }
  return buf;
}

function loopBuf(buf, gainNode, offset) {
  const src = ctx.createBufferSource();
  src.buffer = buf; src.loop = true;
  src.loopStart = 0.5; src.loopEnd = buf.duration - 0.5;
  src.connect(gainNode);
  src.start(0, offset || 0);
  return src;
}

// ── Brown noise (synth) ───────────────────────────────────────────────────────
function makeBrownNoise(vol) {
  const buf = makeBrownBuf(10, 0.022);
  const gain = ctx.createGain();
  gain.gain.value = vol * 0.175;
  gain.connect(getMaster());
  const src = loopBuf(buf, gain);
  return { gain, stop() { try { src.stop(); } catch(e){} } };
}

// ── Thunder (synth) ───────────────────────────────────────────────────────────
function makeThunder(vol) {
  const gain = ctx.createGain();
  gain.gain.value = vol * 50;
  gain.connect(getMaster());
  let active = true;

  function rumble() {
    if (!active) return;
    setTimeout(() => {
      if (!active) return;
      const bufSize = ctx.sampleRate * (2.5 + Math.random() * 3.5);
      const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const d = buf.getChannelData(0);
      let last = 0;
      for (let i = 0; i < bufSize; i++) {
        const w = Math.random() * 2 - 1;
        d[i] = (last + 0.02 * w) / 1.02;
        last = d[i]; d[i] *= 6;
      }
      const src = ctx.createBufferSource(); src.buffer = buf;
      const env = ctx.createGain();
      const attack = 0.06 + Math.random() * 0.2;
      const sustain = 0.5 + Math.random() * 1.2;
      const decay  = 1.5 + Math.random() * 2.5;
      const now = ctx.currentTime;
      env.gain.setValueAtTime(0, now);
      env.gain.linearRampToValueAtTime(1.0, now + attack);
      env.gain.setValueAtTime(1.0, now + attack + sustain);
      env.gain.exponentialRampToValueAtTime(0.0001, now + attack + sustain + decay);
      const lp = ctx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 160 + Math.random() * 100;
      src.connect(lp); lp.connect(env); env.connect(gain);
      src.start();
      rumble();
    }, 4000 + Math.random() * 16000);
  }
  rumble();
  return { gain, stop() { active = false; } };
}

// ── Railroad (synth) ──────────────────────────────────────────────────────────
function makeTrain(vol) {
  const gain = ctx.createGain();
  gain.gain.value = vol * 2.0;
  gain.connect(getMaster());
  let active = true;
  const oscs = [];
  const now = ctx.currentTime;

  // Three detuned low oscillators — natural beating = rumble texture
  [[48, 'triangle', 0.5], [51, 'triangle', 0.4], [72, 'sine', 0.22]].forEach(function(args) {
    var freq=args[0], type=args[1], g=args[2];
    var osc = ctx.createOscillator();
    osc.type = type; osc.frequency.value = freq;
    var og = ctx.createGain(); og.gain.value = g;
    var lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=150;
    osc.connect(lp); lp.connect(og); og.connect(gain);
    osc.start(now); oscs.push(osc);
  });

  // LFO sway
  var lfo = ctx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 0.45;
  var lfoG = ctx.createGain(); lfoG.gain.value = 0.1;
  lfo.connect(lfoG); lfoG.connect(gain.gain);
  lfo.start(now); oscs.push(lfo);

  function makeClack(freq, loudness) {
    var osc2 = ctx.createOscillator(); osc2.type='sine'; osc2.frequency.value=freq;
    var env = ctx.createGain(); var t2=ctx.currentTime;
    env.gain.setValueAtTime(0, t2);
    env.gain.linearRampToValueAtTime(loudness, t2+0.008);
    env.gain.exponentialRampToValueAtTime(0.0001, t2+0.24);
    osc2.connect(env); env.connect(gain);
    osc2.start(t2); osc2.stop(t2+0.28);
  }

  function daDUM() {
    if (!active) return;
    var base = 75 + Math.random()*20;
    makeClack(base, 0.7+Math.random()*0.15);
    setTimeout(function(){ if(active) makeClack(base*0.82, 0.9+Math.random()*0.08); }, 88+Math.random()*18);
    setTimeout(daDUM, 1900+Math.random()*1000);
  }
  daDUM();

  return { gain: gain, stop: function() { active=false; oscs.forEach(function(o){ try{o.stop();}catch(e){} }); } };
}

    pauseAllBtn.textContent = '▶';

    pauseAllBtn.classList.remove('paused');
    pauseAllBtn.classList.add('sounds-active');
    pauseAllBtn.title = 'Pause all sounds';

}

// ── Scene: Hufflepuff cozy living room window ─────────────────────────────────
const canvas = document.getElementById('scene-canvas');
const c = canvas.getContext('2d');
let W, H, t = 0;

// Animated elements

let stormdrops = [];
let fireflies = [];

function activeSet() {
  return new Set([...document.querySelectorAll('.card.active')].map(c => c.dataset.sound));
}

function lerp(a, b, f) { return a + (b - a) * f; }

function drawScene() {
  requestAnimationFrame(drawScene);
  t += 0.016;

  // Dynamic background color — skipped when user has set manual light/dark
  if (Math.round(t * 60) % 90 === 0 && !window._manualTheme) {
    const _ndBg=new Date(), _hrBg=_ndBg.getHours()+_ndBg.getMinutes()/60;
    const bgKF=[
      [0,  [10,10,18]],[5,  [10,10,18]],[6,  [18,10,14]],[7,  [22,14,10]],
      [8,  [14,14,22]],[12, [12,14,22]],[17, [18,14,16]],[18, [24,12,8]],
      [19, [20,10,10]],[20, [16,10,20]],[21, [12,10,20]],[22, [10,10,18]],[24,[10,10,18]],
    ];
    let bgRgb=[10,10,18];
    for(let i=0;i<bgKF.length-1;i++){
      if(_hrBg>=bgKF[i][0]&&_hrBg<bgKF[i+1][0]){
        const f=(_hrBg-bgKF[i][0])/(bgKF[i+1][0]-bgKF[i][0]);
        bgRgb=bgKF[i][1].map((v,j)=>Math.round(v+f*(bgKF[i+1][1][j]-v)));
        break;
      }
    }
    document.documentElement.style.setProperty('--bg',`rgb(${bgRgb})`);
  }

  const p = activeSet();
  const hasRain = p.has('rain');
  const hasThunder = p.has('thunder');
  const hasFire = p.has('fire');
  const hasTrain = p.has('train');
  const hasBreeze = false;
  const anySound = p.size > 0;

  // ── Wheel of the Year: season & sabbat detection ───────────────────────────
  const _nd=new Date(),_mo=_nd.getMonth(),_dy=_nd.getDate(),_md=_mo*100+_dy;
  const _hr=_nd.getHours(),_mn=_nd.getMinutes(),tod=_hr+_mn/60;
  const season=_mo>=2&&_mo<=4?'spring':_mo>=5&&_mo<=7?'summer':_mo>=8&&_mo<=10?'autumn':'winter';
  // Sabbat windows: 2 weeks before the date, 1 day after
  const sabbat=_md>=917&&_md<=1001?'samhain':_md>=1107&&_md<=1122?'yule':_md>=19&&_md<=103?'imbolc':_md>=207&&_md<=221?'ostara':_md>=317&&_md<=402?'beltane':_md>=507&&_md<=522?'litha':_md>=618&&_md<=702?'lughnasadh':_md>=808&&_md<=823?'mabon':null;

  c.clearRect(0, 0, W, H);

  // ── Sky: time-of-day transitions ──
  function lerpRGB(a,b,f){return[Math.round(a[0]+f*(b[0]-a[0])),Math.round(a[1]+f*(b[1]-a[1])),Math.round(a[2]+f*(b[2]-a[2]))];}
  // keyframes: [hour, topRGB, botRGB]
  const skyKF=[
    [0,  [12,14,24],  [20,24,32]],   // deep night
    [5,  [12,14,24],  [20,24,32]],   // pre-dawn (still dark)
    [6,  [42,18,28],  [130,58,32]],  // dawn blush
    [7,  [80,50,30],  [190,115,50]], // golden hour morning
    [8,  [70,110,158],[108,142,188]],// morning sky
    [12, [46,94,166], [76,124,188]], // afternoon blue
    [17, [78,108,166],[108,132,180]],// late afternoon
    [18, [195,72,30], [228,115,62]], // golden hour evening
    [19, [140,44,22], [195,80,38]],  // sunset
    [20, [58,28,46],  [98,40,56]],   // dusk
    [21, [24,20,42],  [36,28,50]],   // blue hour
    [22, [12,14,24],  [20,24,32]],   // night
    [24, [12,14,24],  [20,24,32]],
  ];
  function todSkyColor(ci){
    for(let i=0;i<skyKF.length-1;i++){
      if(tod>=skyKF[i][0]&&tod<skyKF[i+1][0]){
        const f=(tod-skyKF[i][0])/(skyKF[i+1][0]-skyKF[i][0]);
        const rgb=lerpRGB(skyKF[i][ci+1],skyKF[i+1][ci+1],f);
        return`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
      }
    }
    return`rgb(${skyKF[0][ci+1]})`;
  }
  // Alpha for night elements (stars, moon, fireflies): full at night, fade around dawn/dusk
  const nightA=hasThunder?0:(tod<5?1:tod<7?(1-(tod-5)/2):tod<18?0:tod<20?((tod-18)/2):1);
  const skyTop = hasThunder ? '#04060c' : todSkyColor(0);
  const skyBot = hasThunder ? '#0a0e08' : todSkyColor(1);
  const sky = c.createLinearGradient(0, 0, 0, H * 0.82);
  sky.addColorStop(0, skyTop);
  sky.addColorStop(1, skyBot);
  c.fillStyle = sky;
  c.fillRect(0, 0, W, H);

  // Stars — fade with nightA
  if (nightA > 0.02) {
    const starSeed = [
      {x:0.12,y:0.07,r:1.0},{x:0.22,y:0.04,r:0.7},{x:0.31,y:0.11,r:0.8},
      {x:0.40,y:0.06,r:0.6},{x:0.48,y:0.13,r:0.9},{x:0.18,y:0.20,r:0.6},
      {x:0.35,y:0.18,r:0.7},{x:0.52,y:0.08,r:0.8},{x:0.28,y:0.28,r:0.6},
      {x:0.14,y:0.30,r:0.5},{x:0.44,y:0.24,r:0.7},{x:0.58,y:0.16,r:0.6},
    ];
    starSeed.forEach(s => {
      const tw = Math.sin(t * 1.1 + s.x * 18) * 0.25 + 0.75;
      c.beginPath();
      c.arc(s.x * W * 0.72, s.y * H, s.r * tw * (W/560), 0, Math.PI*2);
      c.fillStyle = `rgba(220,215,200,${(0.5 * tw * nightA).toFixed(2)})`;
      c.fill();
    });
  }

  // Sun — arcs across the sky from dawn to dusk
  const sunA = tod<6?0:tod<7?(tod-6):tod<19?1:tod<20?(20-tod):0;
  if (!hasThunder && sunA > 0.02) {
    const sunP = Math.max(0, Math.min(1, (tod-6)/14));
    const sx = W * (0.04 + sunP * 0.60);
    const sy = H * (0.58 - Math.sin(sunP * Math.PI) * 0.50);
    const isGolden = tod<8||tod>17.5;
    const sunR = isGolden ? [255,210,80] : [255,245,160];
    const sg = c.createRadialGradient(sx,sy,0,sx,sy,H*0.28);
    sg.addColorStop(0,`rgba(${sunR},${(sunA*0.55).toFixed(2)})`);
    sg.addColorStop(0.15,`rgba(255,180,50,${(sunA*0.18).toFixed(2)})`);
    sg.addColorStop(1,'transparent');
    c.fillStyle=sg; c.fillRect(0,0,W,H*0.85);
    c.beginPath(); c.arc(sx,sy,H*0.055,0,Math.PI*2);
    c.fillStyle=`rgba(255,252,180,${sunA.toFixed(2)})`; c.fill();
    c.beginPath(); c.arc(sx,sy,H*0.04,0,Math.PI*2);
    c.fillStyle=`rgba(255,255,220,${sunA.toFixed(2)})`; c.fill();
  }

  // Fireflies — only at night
  if (!hasThunder && nightA > 0.02) {
    fireflies.forEach(f => {
      f.phase += f.speed;
      f.bright += f.brightSpeed;
      const bval = Math.max(0, Math.sin(f.bright));
      if (bval < 0.07) return;
      const fx = f.x + Math.cos(f.phase) * f.rx;
      const fy = f.y + Math.sin(f.phase * 0.65) * f.ry;
      if (fx < W * 0.08 || fx > W * 0.64 || fy < H * 0.04 || fy > H * 0.80) return;
      const sc = W / 560;
      const grd = c.createRadialGradient(fx, fy, 0, fx, fy, 6 * sc);
      grd.addColorStop(0,   `rgba(200,255,120,${(bval * 0.82).toFixed(2)})`);
      grd.addColorStop(0.45,`rgba(130,215,50,${(bval * 0.28).toFixed(2)})`);
      grd.addColorStop(1,   'transparent');
      c.fillStyle = grd;
      c.beginPath(); c.arc(fx, fy, 6 * sc, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(fx, fy, 1.1 * sc, 0, Math.PI * 2);
      c.fillStyle = `rgba(230,255,190,${(bval * 0.92).toFixed(2)})`; c.fill();
    });
  }

  // Moon — only at night, fades with nightA
  const mx = W * 0.48, my = H * 0.15, mr = H * 0.09;
  if (!hasThunder && nightA > 0.02) {
    const moonGrd = c.createRadialGradient(mx - mr*0.2, my - mr*0.2, mr*0.1, mx, my, mr);
    moonGrd.addColorStop(0, `rgba(230,232,235,${(0.95*nightA).toFixed(2)})`);
    moonGrd.addColorStop(0.7, `rgba(200,205,210,${(0.88*nightA).toFixed(2)})`);
    moonGrd.addColorStop(1, `rgba(160,165,172,${(0.4*nightA).toFixed(2)})`);
    c.beginPath();
    c.arc(mx, my, mr, 0, Math.PI*2);
    c.fillStyle = moonGrd;
    c.fill();
    const mhalo = c.createRadialGradient(mx, my, mr, mx, my, mr*3.2);
    mhalo.addColorStop(0, `rgba(200,210,225,${(0.06*nightA).toFixed(2)})`);
    mhalo.addColorStop(1, 'transparent');
    c.fillStyle = mhalo;
    c.fillRect(0, 0, W, H * 0.6);
  } else if (hasThunder) {
    // Dark storm clouds — rolling shapes
    c.fillStyle = 'rgba(18,22,28,0.82)';
    const cx1 = W*0.15 + Math.sin(t*0.08)*W*0.02;
    const cx2 = W*0.38 + Math.sin(t*0.06+1)*W*0.02;
    const cx3 = W*0.58 + Math.sin(t*0.07+2)*W*0.015;
    [[cx1,H*0.1,W*0.18,H*0.12],[cx2,H*0.07,W*0.22,H*0.14],[cx3,H*0.12,W*0.15,H*0.10]].forEach(([x,y,rw,rh]) => {
      c.beginPath();
      c.ellipse(x, y, rw, rh, 0, 0, Math.PI*2);
      c.fill();
    });
  }

  // Thunder lightning flash
  if (hasThunder && Math.random() < 0.008) {
    c.fillStyle = 'rgba(210,230,255,0.18)';
    c.fillRect(0, 0, W * 0.65, H);
    // Bolt shape
    if (Math.random() < 0.4) {
      const bx = W * (0.15 + Math.random() * 0.35);
      c.strokeStyle = 'rgba(220,240,255,0.9)';
      c.lineWidth = 1.5 * (window.devicePixelRatio || 1);
      c.beginPath();
      c.moveTo(bx, H * 0.05);
      c.lineTo(bx - W*0.02, H * 0.2);
      c.lineTo(bx + W*0.015, H * 0.25);
      c.lineTo(bx - W*0.025, H * 0.42);
      c.stroke();
    }
  }

  // ── Exterior gentle rain (rain card) ──
  if (hasRain) {
    const dpr = window.devicePixelRatio || 1;
    if (Math.random() < 0.22) {
      raindrops.push({
        x: Math.random() * W * 0.6,
        y: -8 * dpr,
        vy: (0.5 + Math.random() * 0.4) * dpr,
        len: (10 + Math.random() * 8) * dpr,
        alpha: 0.12 + Math.random() * 0.10,
      });
    }
    raindrops = raindrops.filter(d => d.y < H * 0.85);
    raindrops.forEach(d => {
      d.y += d.vy;
      c.beginPath();
      c.moveTo(d.x, d.y);
      c.lineTo(d.x, d.y + d.len);
      c.strokeStyle = 'rgba(180,210,240,' + d.alpha + ')';
      c.lineWidth = 0.7 * dpr;
      c.stroke();
    });
  } else {
    raindrops = [];
  }

  // ── Storm rain (thunder card) — heavier, faster ──
  if (hasThunder) {
    const dpr = window.devicePixelRatio || 1;
    if (Math.random() < 0.55) {
      stormdrops.push({
        x: Math.random() * W * 0.62,
        y: -12 * dpr,
        vy: (1.4 + Math.random() * 1.0) * dpr,
        len: (14 + Math.random() * 12) * dpr,
        alpha: 0.18 + Math.random() * 0.15,
      });
    }
    stormdrops = stormdrops.filter(d => d.y < H * 0.85);
    stormdrops.forEach(d => {
      d.y += d.vy;
      c.beginPath();
      c.moveTo(d.x, d.y);
      c.lineTo(d.x, d.y + d.len);
      c.strokeStyle = 'rgba(160,200,235,' + d.alpha + ')';
      c.lineWidth = 1.0 * dpr;
      c.stroke();
    });
  } else {
    stormdrops = [];
  }

  // ── Full pixel-art interior (Stardew Valley vibes) ─────────────────────────
  const wx = W * 0.085, wy = H * 0.05;
  const ww = W * 0.535, wh = H * 0.75;
  const sillY = wy + wh;
  const sillH = H * 0.06;
  const roomX = wx + ww;

  const P = Math.max(2, Math.round((W - roomX) / 48));
  const totalRoomCols = Math.ceil((W - roomX) / P) + 2;
  const totalRows = Math.ceil(H / P) + 2;

  const rx0 = roomX, ry0 = 0;
  const wallDark = '#1a1408';
  const wallMid  = '#221a0c';

  function px(col, row, color, cw, ch) {
    if (cw === undefined) cw = 1;
    if (ch === undefined) ch = 1;
    c.fillStyle = color;
    c.fillRect(Math.round(rx0 + col*P), Math.round(ry0 + row*P), cw*P, ch*P);
  }
  function pxFull(col, row, color) {
    c.fillStyle = color;
    c.fillRect(Math.round(col*P), Math.round(row*P), P, P);
  }

  // Left wall strip (beside window)
  const leftCols = Math.ceil(wx / P) + 1;
  for (let r = 0; r < totalRows; r++)
    for (let col = 0; col < leftCols; col++)
      pxFull(col, r, (r+col)%11===0 ? wallMid : wallDark);

  // Top wall strip (above window)
  const topRows = Math.ceil(wy / P) + 1;
  for (let r = 0; r < topRows; r++)
    for (let col = 0; col < Math.ceil(W/P)+1; col++)
      pxFull(col, r, (r+col)%11===0 ? wallMid : wallDark);

  // Right room wall
  for (let r = 0; r < totalRows; r++)
    for (let col = 0; col < totalRoomCols; col++)
      px(col, r, (r+col)%11===0 ? wallMid : wallDark);

  // ── Pixel window frame ────────────────────────────────────────────────────
  const fT = Math.max(2, Math.round(W * 0.016 / P));
  const wCol  = Math.floor(wx / P);
  const wyRow = Math.floor(wy / P);
  const wwCols = Math.round(ww / P);
  const whRows = Math.round(wh / P);
  const frameCol = '#4a3418';
  const frameHi  = '#6a4e28';
  const frameSha = '#2a1a08';

  // Top & bottom bars
  for (let col2 = wCol-fT; col2 < wCol+wwCols+fT; col2++) {
    for (let r = wyRow-fT; r < wyRow; r++) pxFull(col2, r, r===wyRow-1?frameHi:frameCol);
    for (let r = wyRow+whRows; r < wyRow+whRows+fT; r++) pxFull(col2, r, r===wyRow+whRows?frameSha:frameCol);
  }
  // Left & right bars
  for (let r = wyRow-fT; r < wyRow+whRows+fT; r++) {
    for (let col2 = wCol-fT; col2 < wCol; col2++) pxFull(col2, r, col2===wCol-1?frameHi:frameCol);
    for (let col2 = wCol+wwCols; col2 < wCol+wwCols+fT; col2++) pxFull(col2, r, col2===wCol+wwCols?frameSha:frameCol);
  }
  // Cross dividers
  const midCol2 = wCol + Math.round(wwCols/2);
  const midRow2 = wyRow + Math.round(whRows/2);
  for (let r = wyRow; r < wyRow+whRows; r++) { pxFull(midCol2,r,frameCol); pxFull(midCol2+1,r,frameSha); }
  for (let col2 = wCol; col2 < wCol+wwCols; col2++) { pxFull(col2,midRow2,frameCol); pxFull(col2,midRow2+1,frameSha); }

  // ── Exterior landscape (visible through window glass) ────────────────────────
  // Clip to inner glass so landscape stays behind the wooden frame
  c.save();
  c.beginPath();
  c.rect(
    Math.round((wCol + fT) * P),
    Math.round((wyRow + fT) * P),
    Math.round((wwCols - fT * 2) * P),
    Math.round((whRows - fT * 2) * P)
  );
  c.clip();

  var horizRow = wyRow + Math.round(whRows * 0.66);

  // Seasonal palette
  var lsBare = season==='winter';
  var lsGround= season==='winter'?'#c0d4e4':season==='autumn'?'#1a0e04':season==='spring'?'#0c1808':'#0b1407';
  var lsHill  = season==='winter'?'#d0e4f4':season==='autumn'?'#221208':season==='spring'?'#0e1e0a':'#0d1a09';
  var lsTreeD = season==='winter'?'#100c0a':season==='autumn'?'#3a1800':season==='spring'?'#1a4010':'#091205';
  var lsTreeM = season==='winter'?'#181008':season==='autumn'?'#7a3c10':season==='spring'?'#4a8830':'#0c1a08';

  // Subtle seasonal sky tint over glass
  if (season!=='summer') {
    var skyT={winter:'rgba(140,180,220,0.07)',autumn:'rgba(100,40,0,0.06)',spring:'rgba(80,140,60,0.05)'};
    c.fillStyle=skyT[season]; c.fillRect(Math.round(wCol*P),Math.round(wyRow*P),wwCols*P,whRows*P);
  }
  // Daylight wash through glass — brightens interior during day, warms at golden hour
  if (sunA > 0.02) {
    var isGoldenHour = tod<8.5||tod>17;
    var dlR = isGoldenHour ? `255,200,120` : `200,220,255`;
    var dlOpacity = (isGoldenHour ? 0.13 : 0.09) * sunA;
    c.fillStyle=`rgba(${dlR},${dlOpacity.toFixed(3)})`;
    c.fillRect(Math.round(wCol*P),Math.round(wyRow*P),wwCols*P,whRows*P);
  }

  // Ground fill
  c.fillStyle = lsGround;
  c.fillRect(Math.round(wCol*P), Math.round(horizRow*P), wwCols*P, (wyRow+whRows-horizRow)*P);

  // Rolling hills along horizon
  for (var hc = wCol; hc < wCol+wwCols; hc++) {
    var hf = (hc - wCol) / wwCols;
    var hh = Math.round(1.2*Math.sin(hf*Math.PI*2.2+0.4) + 0.7*Math.sin(hf*Math.PI*4.1));
    if (hh > 0) {
      c.fillStyle = lsHill;
      c.fillRect(Math.round(hc*P), Math.round((horizRow-hh)*P), P, hh*P);
    }
  }

  // Winter snow on ground
  if (season==='winter') {
    c.fillStyle='rgba(218,232,248,0.92)';
    c.fillRect(Math.round(wCol*P),Math.round((horizRow-1)*P),wwCols*P,2*P);
  }

  // Tree silhouettes — foliage or bare branches by season
  [[wCol+2,5],[wCol+6,7],[wCol+10,5],[wCol+14,6],[wCol+18,4]].forEach(function(tr2) {
    var tx=tr2[0], th=tr2[1];
    if (lsBare) {
      // Bare winter branches: trunk + fork pixels
      c.fillStyle=lsTreeD;
      c.fillRect(Math.round(tx*P),Math.round((horizRow-th)*P),P,(th+1)*P);
      var b1=Math.round(th*0.45),b2=Math.round(th*0.72);
      c.fillRect(Math.round((tx-1)*P),Math.round((horizRow-b1)*P),P,P);
      c.fillRect(Math.round((tx+1)*P),Math.round((horizRow-b1)*P),P,P);
      c.fillStyle=lsTreeM;
      c.fillRect(Math.round((tx-2)*P),Math.round((horizRow-b2)*P),P,P);
      c.fillRect(Math.round((tx+2)*P),Math.round((horizRow-b2)*P),P,P);
      c.fillRect(Math.round((tx-1)*P),Math.round((horizRow-b2-1)*P),P,P);
      c.fillRect(Math.round((tx+1)*P),Math.round((horizRow-b2-1)*P),P,P);
    } else {
      for (var layer=0; layer<th; layer++) {
        var tw=Math.max(1,Math.round((layer+1)*1.2));
        c.fillStyle=layer<2?lsTreeD:lsTreeM;
        c.fillRect(Math.round((tx-Math.floor(tw/2))*P),Math.round((horizRow-th+layer)*P),(tw+1)*P,P);
      }
    }
    c.fillStyle=lsTreeD;
    c.fillRect(Math.round(tx*P),Math.round(horizRow*P),P,P);
  });

  // Autumn: drifting leaves
  if (season==='autumn') {
    var lfC=['#8a3a00','#c05a10','#a04800','#d06000','#6a2c00'];
    for (var li=0;li<10;li++) {
      var lx=wCol+((li*7.3+t*(1.5+li%3*0.5)*3+Math.sin(t*0.8+li*1.7)*3)%wwCols);
      var ly=wyRow+((t*(2+li%4*0.6)*5+li*11.3)%(whRows*5))/5;
      c.fillStyle=lfC[li%5]; c.fillRect(Math.round(lx*P),Math.round(ly*P),P,P);
    }
  }

  // Spring: floating petals
  if (season==='spring') {
    var ptC=['#e8a0c0','#f0c0d8','#d880a8','#c06090'];
    for (var pi2=0;pi2<8;pi2++) {
      var px2=wCol+((pi2*9.1+t*(0.8+pi2%3*0.3)*2+Math.sin(t*1.1+pi2*2.3)*2)%wwCols);
      var py2=wyRow+((t*(1+pi2%3*0.5)*4+pi2*17.3)%(whRows*4))/4;
      c.fillStyle=ptC[pi2%4]; c.fillRect(Math.round(px2*P),Math.round(py2*P),P,P);
    }
  }

  // Falling snow
  if (season==='winter') {
    for (var sni=0;sni<22;sni++) {
      var snX=wCol+((sni*11.7+t*(0.9+sni%3*0.3)*7+Math.sin(t*0.7+sni*1.3)*1.5)%wwCols);
      var snY=wyRow+((t*(1.2+sni*0.12)*8+sni*13.1)%(whRows*8))/8;
      c.fillStyle='rgba(228,240,252,'+(0.5+0.38*Math.sin(sni*2.1))+')';
      c.fillRect(Math.round(snX*P),Math.round(snY*P),P,P);
    }
  }

  // -- Featured trees -- seasonal + time-of-day responsive --
  var maxTreeH = horizRow - wyRow - 3;
  var ftH  = Math.min(Math.round(whRows * 0.64), maxTreeH);
  var ft2H = Math.min(Math.round(whRows * 0.40), maxTreeH - 3);
  var ftX  = wCol + Math.round(wwCols * 0.70);
  var ft2X = wCol + Math.round(wwCols * 0.42);

  function drawSceneTree(tx, th, dark, mid) {
    var trW = th > 10 ? 2 : 1;
    for (var fr = horizRow; fr >= horizRow - th; fr--) {
      c.fillStyle = dark;
      c.fillRect(Math.round(tx*P), Math.round(fr*P), (fr > horizRow-3 ? trW+1 : trW)*P, P);
    }
    if (lsBare) {
      var brs = [[-1,Math.round(th*0.38),-1,4],[trW,Math.round(th*0.38),1,4],
                 [-2,Math.round(th*0.60),-1,5],[trW+1,Math.round(th*0.60),1,5],
                 [-1,Math.round(th*0.80),-1,3],[trW,Math.round(th*0.80),1,3]];
      brs.forEach(function(b) {
        for (var bi=0; bi<b[3]; bi++) {
          var bx=tx+b[0]+b[2]*bi, by=horizRow-b[1]-bi;
          if (bx>=wCol&&bx<wCol+wwCols&&by>=wyRow) { c.fillStyle=dark; c.fillRect(Math.round(bx*P),Math.round(by*P),P,P); }
        }
      });
    } else {
      var crownH = Math.round(th * 0.70);
      for (var fy=0; fy<crownH; fy++) {
        var prog = fy / crownH;
        var half = Math.max(1, Math.round((0.25 + prog*0.75) * crownH * 0.52));
        var ry = horizRow - th + fy;
        if (ry < wyRow) continue;
        for (var fx=tx-half; fx<=tx+half+trW-1; fx++) {
          if (fx<wCol||fx>=wCol+wwCols) continue;
          var isEdge = (fx===tx-half||fx===tx+half+trW-1);
          c.fillStyle = (isEdge||fy<2) ? dark : ((fx+fy)%4===0 ? dark : mid);
          c.fillRect(Math.round(fx*P), Math.round(ry*P), P, P);
        }
      }
    }
  }

  drawSceneTree(ft2X, ft2H, lsTreeD, lsTreeM);
  drawSceneTree(ftX,  ftH,  lsTreeD, lsTreeM);

  // Spring flower speckles on feature trees
  if (season==='spring') {
    var spkCols=['#e86090','#f0a0b8','#f8c8d8'];
    [[ftX,ftH],[ft2X,ft2H]].forEach(function(td){
      var tx=td[0],th=td[1],trW=2;
      var crownH=Math.round(th*0.70);
      var half=Math.round(crownH*0.52*0.9);
      for(var si=0;si<Math.round(crownH*1.2);si++){
        var sx=tx-half+Math.round((si*7+si*si*3)%(half*2+trW));
        var sy=horizRow-th+Math.round((si*5)%crownH);
        if(sx<wCol||sx>=wCol+wwCols||sy<wyRow) continue;
        c.fillStyle=spkCols[si%3];
        c.fillRect(Math.round(sx*P),Math.round(sy*P),P,P);
      }
    });
    // Small bg trees — light pink tips
    [[4,5],[18,7],[32,5],[50,6],[64,4]].forEach(function(tr2,i){
      var tx=wCol+tr2[0],th=tr2[1];
      if(i%2===0){c.fillStyle='#f0a0b8';c.fillRect(Math.round((tx+Math.floor(th*0.3)%2)*P),Math.round((horizRow-th+1)*P),P,P);}
    });
  }

  // Railroad tracks
  var trackRow = wyRow + Math.round(whRows * 0.82);
  c.fillStyle='#3e3020';
  c.fillRect(Math.round(wCol*P), Math.round(trackRow*P), wwCols*P, P);
  c.fillRect(Math.round(wCol*P), Math.round((trackRow+2)*P), wwCols*P, P);
  for (var ti=wCol; ti<wCol+wwCols; ti+=4) {
    c.fillStyle='#2a1a0e';
    c.fillRect(Math.round(ti*P), Math.round((trackRow-1)*P), 2*P, 4*P);
  }

  // Train (when railroad sound is on)
  if (hasTrain) {
    var tSpeed=6.5, tTotalW=26;
    var tPos=wCol+Math.round((t*tSpeed)%(wwCols+tTotalW+8))-tTotalW;
    var tTop=trackRow-5;
    function tpx(col,row,color){if(col<wCol||col>=wCol+wwCols)return;pxFull(col,row,color);}
    function trect(col,row,w,h,color){var x1=Math.max(col,wCol),x2=Math.min(col+w,wCol+wwCols);if(x1>=x2)return;c.fillStyle=color;c.fillRect(Math.round(x1*P),Math.round(row*P),(x2-x1)*P,h*P);}
    trect(tPos,tTop+1,10,4,'#1e2840'); trect(tPos,tTop,10,1,'#262e48');
    [tPos+1,tPos+3,tPos+6,tPos+8].forEach(function(wx2){tpx(wx2,tTop+2,'rgba(255,230,160,0.75)');tpx(wx2+1,tTop+2,'rgba(255,230,160,0.75)');});
    [tPos+1,tPos+4,tPos+7].forEach(function(wx2){tpx(wx2,tTop+5,'#111');});
    var ex=tPos+10;
    trect(ex,tTop,14,5,'#1a2238'); trect(ex,tTop-1,14,1,'#222c40');
    trect(ex+2,tTop-2,4,2,'#1e2840'); trect(ex+4,tTop-3,2,2,'#161e30'); trect(ex+3,tTop-4,4,1,'#1a2238');
    var hlGrd=c.createRadialGradient((ex+13.5)*P,(tTop+2.5)*P,0,(ex+13.5)*P,(tTop+2.5)*P,5*P);
    hlGrd.addColorStop(0,'rgba(255,240,180,0.5)'); hlGrd.addColorStop(1,'transparent');
    c.fillStyle=hlGrd; c.fillRect(Math.round((ex+10)*P),Math.round(tTop*P),8*P,6*P);
    tpx(ex+13,tTop+2,'rgba(255,245,200,0.9)');
    [ex+1,ex+4,ex+7,ex+10].forEach(function(wx2){tpx(wx2,tTop+5,'#111');tpx(wx2+1,tTop+5,'#0a0a0a');});
    trect(ex+9,tTop-2,5,3,'#1a2030'); tpx(ex+10,tTop-1,'rgba(255,210,100,0.6)'); tpx(ex+11,tTop-1,'rgba(255,210,100,0.6)');
    [0,1,2].forEach(function(pi){
      var puffAlpha=Math.max(0,0.45-pi*0.14);
      var puffX=(ex+5+Math.sin(t*2.5+pi)*0.8)*P, puffY=(tTop-4-pi)*P;
      if((ex+5)>=wCol&&(ex+5)<wCol+wwCols){c.fillStyle='rgba(180,195,210,'+puffAlpha+')';c.beginPath();c.arc(puffX,puffY,P*(0.9+pi*0.3),0,Math.PI*2);c.fill();}
    });
  }

  // Time-of-day + season tint over entire landscape view
  if (sunA > 0.02) {
    var seaDayCol = season==='autumn'?'240,185,80':season==='winter'?'195,218,252':season==='spring'?'200,238,185':'212,232,198';
    var isGoldH2 = tod<8.5||tod>17;
    c.fillStyle='rgba('+(isGoldH2?'255,200,100':seaDayCol)+','+(((isGoldH2?0.20:0.14)*sunA).toFixed(3))+')';
    c.fillRect(Math.round(wCol*P),Math.round(wyRow*P),wwCols*P,whRows*P);
  }
  c.restore(); // end landscape clip

  // Redraw frame & cross dividers on top of landscape
  for (let r = wyRow; r < wyRow+whRows; r++) {
    for (let ft2 = 0; ft2 < fT; ft2++) {
      pxFull(wCol+ft2, r, frameCol); pxFull(wCol+wwCols-1-ft2, r, frameSha);
    }
  }
  for (let col2 = wCol; col2 < wCol+wwCols; col2++) {
    for (let ft2 = 0; ft2 < fT; ft2++) {
      pxFull(col2, wyRow+ft2, frameCol); pxFull(col2, wyRow+whRows-1-ft2, frameSha);

  // Side edges
  for(var rr2=rrTop;rr2<=rrY;rr2++){ px(rrX,rr2,'#1e7878'); px(rrX+rrW-1,rr2,'#1e7878'); }

  // Speaker grille — left ~40%, dot pattern on cream backing
  var spEnd = rrX + Math.floor(rrW*0.42);
  for(var rr2=rrTop+1;rr2<=rrY-1;rr2++)
    for(var rc2=rrX+1;rc2<spEnd;rc2++)
      px(rc2,rr2,(rc2+rr2)%2===0?'#0e4040':'#c8a888');

  // Tuning band — right portion, cream/tan
  var tbX = spEnd+1, tbEnd = rrX+rrW-2;
  for(var rr2=rrTop+1;rr2<=rrY-1;rr2++)
    for(var rc2=tbX;rc2<tbEnd;rc2++) px(rc2,rr2,'#f0dca0');
  // Frequency lines (vertical ticks on tuning band)
  for(var rc2=tbX+1;rc2<tbEnd-1;rc2+=2) px(rc2,rrTop+2,'#b09050');
  // Tuning needle — red, about 60% from left of band
  var needle = tbX + Math.floor((tbEnd-tbX)*0.6);
  for(var rr2=rrTop+1;rr2<=rrY-2;rr2++) px(needle,rr2,'#c83020');
  px(needle,rrTop+1,'#ff4030'); // bright tip

  // Knobs row along bottom edge
  var knobY = rrY-1;
  var kCols = ['#8a2c14','#c8a030','#3a6020','#2848a0'];
  var kStep = Math.max(2, Math.floor(rrW / (kCols.length+1)));
  for(var ki=0;ki<kCols.length;ki++){
    var kx=rrX+Math.floor(kStep*0.6)+ki*kStep;
    if(kx < rrX+rrW-1){ px(kx,knobY,kCols[ki]); px(kx,knobY-1,'#f0dca0'); }
  }

  // Antenna — tilts up-right from top-right
  var aX=rrX+rrW-2, aY=rrTop;
  px(aX,aY-1,'#888'); px(aX+1,aY-2,'#999'); px(aX+1,aY-3,'#aaa'); px(aX+2,aY-4,'#bbb');

  // Base foot — slightly wider
  for(var rc2=rrX-1;rc2<=rrX+rrW;rc2++) px(rc2,rrY,'#125858');

  // AM·FM label on tuning band
  if(rrW>=12){
    var lbY=rrY-2;
    px(tbX,lbY,'#8a6030'); px(tbX+1,lbY,'#8a6030'); // tiny label dots suggestion
  }

  // Power light + glow when any sound active
  var radioOn = hasFire||hasRain||hasThunder||hasTrain;
  if(radioOn){
    var rBlink=0.6+Math.sin(t*2.8)*0.4;
    c.fillStyle='rgba(255,80,40,'+rBlink.toFixed(2)+')';
    c.fillRect(Math.round(rx0+(rrX+rrW-2)*P), Math.round((rrTop+1)*P), P, P);
    // Warm glow radiating from speaker area
    var glX=Math.round(rx0+(rrX+Math.floor(rrW*0.2))*P), glY=Math.round((rrTop+rrH*0.5)*P);
    var glr=c.createRadialGradient(glX,glY,0,glX,glY,rrH*P*1.5);
    glr.addColorStop(0,'rgba(255,160,80,0.18)'); glr.addColorStop(1,'transparent');
    c.fillStyle=glr; c.fillRect(glX-rrH*P*1.5,glY-rrH*P*1.5,rrH*P*3,rrH*P*3);
  } else {
    px(rrX+rrW-2,rrTop+1,'#0a2828');
  }

  // ── Table lantern — sitting on the right side of the windowsill ──────────────
  // Position: right portion of sill, sitting on top of it
  var lLC = wCol + wwCols - 11;  // left col of lantern (wider now)
  var lLR = sillRow2;             // sill surface row

  if (hasFire) {
    // Warm glow
    var lgx3=Math.round((lLC+4)*P), lgy3=Math.round((lLR-6)*P);
    var lgl3=c.createRadialGradient(lgx3,lgy3,0,lgx3,lgy3,16*P);
    lgl3.addColorStop(0,'rgba(255,215,90,'+(0.55+candleFlicker*0.14)+')');
    lgl3.addColorStop(0.35,'rgba(200,140,40,'+(0.20+candleFlicker*0.05)+')');
    lgl3.addColorStop(1,'transparent');
    c.fillStyle=lgl3;
    c.fillRect(lgx3-16*P, lgy3-14*P, 32*P, 24*P);
  }

  // Silver palette: dark=#2a2e34, mid=#3e4450, bright=#5a6270, hi=#7a8490
  // Finial / top knob
  pxFull(lLC+3, lLR-13, '#3e4450'); pxFull(lLC+4, lLR-13, '#5a6270');

  // Top cap (pyramid roof — 3 rows)
  pxFull(lLC+2, lLR-12, '#2a2e34'); pxFull(lLC+3, lLR-12, '#5a6270'); pxFull(lLC+4, lLR-12, '#7a8490'); pxFull(lLC+5, lLR-12, '#5a6270'); pxFull(lLC+6, lLR-12, '#2a2e34');
  pxFull(lLC+1, lLR-11, '#2a2e34'); pxFull(lLC+2, lLR-11, '#3e4450'); pxFull(lLC+3, lLR-11, '#5a6270'); pxFull(lLC+4, lLR-11, '#7a8490'); pxFull(lLC+5, lLR-11, '#5a6270'); pxFull(lLC+6, lLR-11, '#3e4450'); pxFull(lLC+7, lLR-11, '#2a2e34');
  for (var lci=lLC; lci<=lLC+8; lci++) pxFull(lci, lLR-10, lci===lLC||lci===lLC+8?'#2a2e34':lci===lLC+1||lci===lLC+7?'#3e4450':'#4e5562');

  // Glass body (7 rows, with silver frame)
  var fa3=hasFire?(0.72+candleFlicker*0.14):0;
  var lCtr = lLC+4;
  for (var llr=lLR-9; llr<=lLR-3; llr++) {
    pxFull(lLC,   llr, '#2a2e34'); pxFull(lLC+8, llr, '#2a2e34');
    pxFull(lLC+1, llr, '#3e4450'); pxFull(lLC+7, llr, '#3e4450');
    for (var llc=lLC+2; llc<=lLC+6; llc++) {
      if (hasFire) {
        var af3 = fa3 - Math.abs(llc-lCtr)*0.08 - Math.abs(llr-(lLR-6))*0.04;
        c.fillStyle='rgba(255,218,78,'+Math.max(0.18,af3)+')';
        c.fillRect(Math.round(llc*P), Math.round(llr*P), P, P);
      } else {
        pxFull(llc, llr, '#181c20');
      }
    }
  }

  // Flame
  if (hasFire) {
    var flH3 = 2 + Math.round(candleFlicker * 2);
    for (var llr2=lLR-9; llr2>=lLR-9-flH3; llr2--) {
      pxFull(lCtr, llr2, 'rgba(255,248,150,0.95)');
      if (llr2 < lLR-9) { pxFull(lCtr-1, llr2, 'rgba(255,220,80,0.5)'); pxFull(lCtr+1, llr2, 'rgba(255,220,80,0.4)'); }
    }
  }

  // Base collar
  c.fillStyle='#3e4450'; c.fillRect(Math.round((lLC)*P), Math.round((lLR-2)*P), 9*P, P);
  c.fillStyle='#5a6270'; c.fillRect(Math.round((lLC+1)*P), Math.round((lLR-2)*P), 7*P, P);
  // Base body
  c.fillStyle='#4e5562'; c.fillRect(Math.round((lLC)*P), Math.round((lLR-1)*P), 9*P, P);
  c.fillStyle='#3e4450'; c.fillRect(Math.round((lLC)*P), Math.round(lLR*P), 9*P, P);
  // Base foot
  c.fillStyle='#2a2e34'; c.fillRect(Math.round((lLC-1)*P), Math.round((lLR+1)*P), 11*P, P);
  c.fillStyle='#3e4450'; c.fillRect(Math.round((lLC)*P), Math.round((lLR+1)*P), 9*P, P);

  // ── String lights (drawn last — in front of everything) ───────────────────
  var lightPalette = {
    samhain: [[220,80,255],[255,80,20],[140,0,220],[255,140,0]],
    yule:    [[255,80,80],[60,180,80],[255,220,60],[80,160,255],[255,255,255]],
    imbolc:  [[255,255,220],[200,220,255],[255,210,240],[220,240,220]],
    ostara:  [[255,160,200],[160,220,160],[255,240,120],[180,200,255]],
    beltane: [[255,60,80],[60,200,80],[255,220,40],[80,180,255],[255,120,200]],
    litha:   [[255,240,60],[255,200,20],[255,255,160],[255,220,80]],
    lughnasadh:[[255,200,40],[220,140,30],[255,230,80],[200,120,20]],
    mabon:   [[220,80,20],[180,100,20],[255,160,40],[150,60,10]],
  };
  var lPal = lightPalette[sabbat] || [[255,210,80],[255,180,50],[255,230,110],[255,195,60]];
  var bulbSpacing = 7;
  var wireY = 2.2 * P;
  // Wire
  c.strokeStyle='rgba(60,45,25,0.55)'; c.lineWidth=Math.max(1,P*0.4);
  c.beginPath(); c.moveTo(0,wireY); c.lineTo(W,wireY); c.stroke();
  // Bulbs
  for (var bi=0; bi * bulbSpacing * P < W + bulbSpacing*P; bi++) {
    var bx2 = (bi * bulbSpacing + 1) * P;
    var by2 = wireY + 1.8 * P;
    var rgb = lPal[bi % lPal.length];
    var twinkle = 0.72 + 0.22 * Math.sin(t * 0.5 + bi * 1.618);
    // Glow halo
    var bgrd = c.createRadialGradient(bx2, by2, 0, bx2, by2, 3.5*P);
    bgrd.addColorStop(0,'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+(twinkle*0.55)+')');
    bgrd.addColorStop(1,'transparent');
    c.fillStyle=bgrd; c.fillRect(bx2-4*P, by2-4*P, 8*P, 8*P);
    // Bulb body
    c.fillStyle='rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+twinkle+')';
    c.fillRect(bx2-P*0.5, by2-P*0.5, P*1.5, P*2);
    // Tiny cap
    c.fillStyle='rgba(80,60,30,0.7)';
    c.fillRect(bx2-P*0.3, wireY+P*0.8, P, P*0.8);
  }
}



drawScene();
</script>

<script>
// ── Light / dark mode toggle (isolated block so main-script errors can't affect it) ──
(function() {
  var btn = document.getElementById('theme-btn');
  if (!btn) return;

  var saved = localStorage.getItem('softHoursLight');
  var tod   = new Date().getHours() + new Date().getMinutes() / 60;
  var light = saved !== null ? saved === 'true' : (tod >= 7 && tod < 19);

  function apply() {
    btn.textContent = light ? '🌙' : '☀️';
    window._manualTheme = true;
    var de = document.documentElement.style;
    var bs = document.body.style;
    if (light) {
      de.setProperty('--bg',      '#f2e8d6');
      de.setProperty('--surface', '#e8dcc8');
      de.setProperty('--surface2','#ddd0b8');
      de.setProperty('--rim',     '#c4b090');
      de.setProperty('--mist',    '#7a6040');
      de.setProperty('--soft',    '#3c2810');
      de.setProperty('--cream',   '#281808');
      bs.setProperty('background',        '#f2e8d6');
      bs.setProperty('background-image',  'radial-gradient(ellipse 70% 35% at 50% 0%,rgba(160,120,40,0.10) 0%,transparent 70%),radial-gradient(ellipse 40% 25% at 20% 100%,rgba(100,140,60,0.07) 0%,transparent 60%)');
      bs.setProperty('color',             '#3c2810');
    } else {
      ['--bg','--surface','--surface2','--rim','--mist','--soft','--cream']
        .forEach(function(v){ de.removeProperty(v); });
      bs.removeProperty('background');
      bs.removeProperty('background-image');
      bs.removeProperty('color');
    }
  }

  apply();

  btn.addEventListener('click', function() {
    light = !light;
    localStorage.setItem('softHoursLight', light);
    apply();
  });
}());
</script>
